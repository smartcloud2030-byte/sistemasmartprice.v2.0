services:
  # ─────────────────────────────────────────
  # App SmartPrice (React + Express + Socket.io)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartprice_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smartprice
      DB_USER: smartprice
      DB_PASSWORD: ${DB_PASSWORD}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: smartprice-images
      MINIO_PUBLIC_URL: https://imagens.${DOMAIN}
      GALLERY_PASSWORD: ${GALLERY_PASSWORD}
      API_SECRET: ${API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smartprice_net
    volumes:
      - app_uploads:/app/uploads

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartprice_postgres
    restart: always
    environment:
      POSTGRES_DB: smartprice
      POSTGRES_USER: smartprice
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smartprice_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartprice -d smartprice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: smartprice_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: https://minio-admin.${DOMAIN}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - smartprice_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO setup
  # ─────────────────────────────────────────
  minio_setup:
    image: minio/mc:latest
    container_name: smartprice_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/smartprice-images;
        mc anonymous set download local/smartprice-images;
        echo 'Bucket smartprice-images criado e configurado como público';
        exit 0;
      "
    networks:
      - smartprice_net

networks:
  smartprice_net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  app_uploads:
