# ─────────────────────────────────────────
# Nginx — SmartPrice
# Salvar em: /etc/nginx/sites-available/smartprice
# ─────────────────────────────────────────

# App Principal
server {
    listen 80;
    server_name seudominio.com.br www.seudominio.com.br;

    # Redirecionar para HTTPS (Certbot adiciona automaticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name seudominio.com.br www.seudominio.com.br;

    # SSL (Certbot preenche automaticamente)
    ssl_certificate /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;

    # Segurança
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Tamanho máximo de upload
    client_max_body_size 100M;

    # Gzip para performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # App SmartPrice
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Socket.io específico
    location /socket.io/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─────────────────────────────────────────
# Galeria de Imagens (MinIO público)
# ─────────────────────────────────────────
server {
    listen 80;
    server_name imagens.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name imagens.seudominio.com.br;

    ssl_certificate /etc/letsencrypt/live/imagens.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imagens.seudominio.com.br/privkey.pem;

    # Cache agressivo para imagens (Cloudflare vai cachear em cima disso)
    location / {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache de imagens no próprio Nginx
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options nosniff;
    }
}

# ─────────────────────────────────────────
# Painel Admin MinIO (acesso restrito)
# ─────────────────────────────────────────
server {
    listen 80;
    server_name minio-admin.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name minio-admin.seudominio.com.br;

    ssl_certificate /etc/letsencrypt/live/minio-admin.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio-admin.seudominio.com.br/privkey.pem;

    # Limitar acesso apenas ao seu IP (recomendado)
    # allow SEU_IP_AQUI;
    # deny all;

    location / {
        proxy_pass http://localhost:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
